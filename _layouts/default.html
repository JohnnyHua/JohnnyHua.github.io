<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% feed_meta %}
  {% seo %}
</head>
<body>
  <header>
    <nav>
      <a href="{{ '/' | relative_url }}" class="logo">{{ site.title }}</a>
      <div class="nav-right">
        <button id="lang-toggle" class="lang-btn" onclick="toggleLang()">
          <span class="lang-en">中文</span>
          <span class="lang-zh" style="display:none;">EN</span>
        </button>
        <ul>
          {% for item in site.nav %}
          <li><a href="{{ item.path | relative_url }}">{{ item.name }}</a></li>
          {% endfor %}
        </ul>
      </div>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author }}</p>
  </footer>

  <script>
    (function() {
      var lang = localStorage.getItem('lang') || 'en';
      if (lang === 'zh') {
        document.documentElement.lang = 'zh';
        document.querySelectorAll('.lang-en').forEach(function(el) { el.style.display = 'none'; });
        document.querySelectorAll('.lang-zh').forEach(function(el) { el.style.display = ''; });
        document.querySelectorAll('[data-lang="en"]').forEach(function(el) { el.style.display = 'none'; });
        document.querySelectorAll('[data-lang="zh"]').forEach(function(el) { el.style.display = ''; });
      }
    })();

    function toggleLang() {
      var current = localStorage.getItem('lang') || 'en';
      var newLang = current === 'en' ? 'zh' : 'en';
      localStorage.setItem('lang', newLang);
      document.documentElement.lang = newLang;
      
      document.querySelectorAll('.lang-en').forEach(function(el) { 
        el.style.display = newLang === 'en' ? '' : 'none'; 
      });
      document.querySelectorAll('.lang-zh').forEach(function(el) { 
        el.style.display = newLang === 'zh' ? '' : 'none'; 
      });
      document.querySelectorAll('[data-lang="en"]').forEach(function(el) { 
        el.style.display = newLang === 'en' ? '' : 'none'; 
      });
      document.querySelectorAll('[data-lang="zh"]').forEach(function(el) { 
        el.style.display = newLang === 'zh' ? '' : 'none'; 
      });
    }
  </script>
</body>
</html>
